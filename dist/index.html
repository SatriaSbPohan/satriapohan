<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velocitron - Premium Sports Car Showcase</title>
    <meta name="description" content="Experience the future of speed with our interactive 3D sports car showcase.">
    <script type="module" crossorigin src="/assets/index-C-c56zyj.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C31FRBy7.css">
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="text-center">
        <h1 class="font-display text-4xl text-neon-blue tracking-widest mb-4 animate-pulse">VELOCITRON</h1>
        <div class="w-64 h-1 bg-gray-800 rounded overflow-hidden">
          <div id="progress-bar" class="h-full bg-neon-blue w-0 transition-all duration-300"></div>
        </div>
        <p id="loading-text" class="text-gray-400 mt-2 text-sm font-mono">INITIALIZING SYSTEM...</p>
      </div>
    </div>

    <!-- 3D Scene Container -->
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <!-- Overlay UI -->
    <div id="ui-container" class="relative z-10 w-full h-full pointer-events-none flex flex-col justify-between p-6 md:p-12 opacity-0 transition-opacity duration-1000">
      
      <!-- Header -->
      <header class="flex justify-between items-start pointer-events-auto">
        <div>
          <h1 class="font-display text-3xl md:text-5xl font-bold italic tracking-tighter text-white">
            VELOCI<span class="text-neon-blue">TRON</span>
          </h1>
          <p class="text-sm md:text-base text-gray-400 font-mono mt-1 tracking-widest">PREMIUM AUTOMOTIVE GALLERY</p>
        </div>
        
        <nav class="hidden md:flex gap-8 font-mono text-sm">
          <a href="#" class="text-white hover:text-neon-blue transition-colors">MODELS</a>
          <a href="#" class="text-white hover:text-neon-blue transition-colors">TECHNOLOGY</a>
          <a href="#" class="text-white hover:text-neon-blue transition-colors">ORDER</a>
        </nav>
      </header>

      <!-- Main Content / Specs Panel -->
      <div class="flex-1 flex items-center justify-end pointer-events-none">
        
        <!-- Specs Panel (Right Side) -->
        <div id="specs-panel" class="glass-panel p-6 md:p-8 w-full md:w-80 transform translate-x-20 opacity-0 transition-all duration-700 pointer-events-auto">
          <h2 id="car-name" class="font-display text-2xl md:text-3xl font-bold mb-2 text-white border-b border-white/10 pb-2">
            SPECTRE <span class="text-neon-blue">GT</span>
          </h2>
          <p id="car-desc" class="text-gray-300 text-sm leading-relaxed mb-6 font-light">
            Defining the edge of performance and luxury.
          </p>

          <div class="space-y-4 font-mono text-sm">
            <div class="flex justify-between items-center group">
              <span class="text-gray-500 group-hover:text-white transition-colors">TOP SPEED</span>
              <span id="spec-speed" class="text-neon-blue font-bold">340 KM/H</span>
            </div>
            <div class="flex justify-between items-center group">
              <span class="text-gray-500 group-hover:text-white transition-colors">0-100 KM/H</span>
              <span id="spec-accel" class="text-neon-blue font-bold">2.9 S</span>
            </div>
            <div class="flex justify-between items-center group">
              <span class="text-gray-500 group-hover:text-white transition-colors">HORSEPOWER</span>
              <span id="spec-hp" class="text-neon-blue font-bold">780 HP</span>
            </div>
            <div class="flex justify-between items-center group">
              <span class="text-gray-500 group-hover:text-white transition-colors">ENGINE</span>
              <span id="spec-engine" class="text-neon-blue font-bold">V12 HYBRID</span>
            </div>
          </div>

          <button class="w-full mt-8 py-3 bg-neon-blue/10 border border-neon-blue text-neon-blue font-display font-bold tracking-wider hover:bg-neon-blue hover:text-black transition-all uppercase text-sm">
            Configure Now
          </button>
        </div>
      </div>

      <!-- Bottom Gallery & Controls -->
      <div class="pointer-events-auto">
        <div class="flex flex-col md:flex-row items-end md:items-center justify-between gap-6">
          
          <!-- Color Selector (if needed later, placeholder) -->
          <div class="flex gap-2">
            <!-- Colors can be injected here -->
          </div>

          <!-- Car Gallery Thumbnails -->
          <div id="gallery-bar" class="flex gap-4 overflow-x-auto pb-2 w-full md:w-auto max-w-full">
            <!-- Cards injected via JS -->
          </div>

        </div>
      </div>

    </div>

    <!-- Scripts -->
  </body>
</html>
